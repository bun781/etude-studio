name: Release installers

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact_name: reference-practice-mac.dmg
            bundle_glob: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact_name: reference-practice-windows.exe
            bundle_glob: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run tauri -- build

      - name: Normalize installer name
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp ${{ matrix.platform.bundle_glob }} "release-assets/${{ matrix.platform.artifact_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: release-assets/${{ matrix.platform.artifact_name }}

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: release-assets/${{ matrix.platform.artifact_name }}
